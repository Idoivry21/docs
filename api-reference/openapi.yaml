    ApiSuccessResponse:
      type: object
      required:
        - data
      properties:
        data:
          description: Response payload (type varies by endpoint)
        meta:
          type: object
          additionalProperties: true
          description: Optional metadata (pagination, timestamps, etc.)
      example:
        data: {}
        meta:
          timestamp: 2026-01-26T10:00:00Z
    ApiErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: HTTP error name
          example: Bad Request
        message:
          type: string
          description: Human-readable error message
          example: Invalid request body
        code:
          type: string
          description: Programmatic error code for client handling
          example: VALIDATION_FAILED
        details:
          description: Additional error context (validation errors, stack traces in dev,
            etc.)
          example:
            - field: provider
              message: Provider is required
        retryAfter:
          oneOf:
            - type: number
            - type: string
          description: Retry delay in seconds for rate limiting (429 responses)
          example: 60
    ValidationError:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          description: JSON path to the invalid field
          example: credentials.apiKey
        message:
          type: string
          description: Human-readable validation error message
          example: API key is required
    PaginationMeta:
      type: object
      required:
        - page
        - limit
        - total
        - hasMore
      properties:
        page:
          type: integer
          minimum: 1
          description: Current page number (1-based)
          example: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
          description: Number of items per page
          example: 50
        total:
          type: integer
          minimum: 0
          description: Total number of items across all pages
          example: 150
        hasMore:
          type: boolean
          description: Whether there are more pages available
          example: true
    UserRole:
