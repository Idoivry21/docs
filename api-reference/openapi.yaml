        - `slack`: Slack workspace message provider
        - `gmail`: Gmail email thread provider
        - `hubspot`: HubSpot CRM provider
        - `asana`: Asana task and comment provider
        - `notion`: Notion page and database provider
        - `clickup`: ClickUp task and comment provider
        - `csv`: CSV file upload provider
        - `manual_upload`: Manual file upload provider
